<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملاحف فيروز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
background:#fff;
color:#111;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
background:white;
}

.logo{
font-weight:700;
font-size:20px;
letter-spacing:1px;
}

nav a{
margin:0 10px;
text-decoration:none;
color:#333;
font-size:14px;
}

nav a:hover{
color:#d4af37;
}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(180deg,#fff,#fff6fa);
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
color:#666;
font-size:18px;
max-width:500px;
}

.btn{
margin-top:20px;
padding:12px 28px;
background:#d4af37;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

/* PRODUCTS */
.section{
padding:60px 40px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
border:1px solid #eee;
border-radius:16px;
overflow:hidden;
transition:0.3s;
background:white;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#d4af37;
font-weight:bold;
margin-top:5px;
}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#111;
color:white;
border-radius:10px;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid #eee;
color:#777;
}
</style>

</head>

<body>

<header>
<div class="logo">ملاحف فيروز</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#products">الملاحف</a>
<a href="#">من نحن</a>
<a href="#">تواصل</a>
</nav>
</header>

<section class="hero">
<h1>أناقة الملاحف العصرية</h1>
<p>تصاميم فاخرة تجمع بين البساطة والأنوثة بأسلوب حديث</p>
<button class="btn">تسوقي الآن</button>
</section>

<section class="section" id="products">
<div class="title">الأكثر طلبًا</div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<div class="card-content">
<h3>ملحفة روز</h3>
<div class="price">199 درهم</div>
<button>طلب عبر واتساب</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1618354691328-8b0b1c9a0b7b">
<div class="card-content">
<h3>ملحفة فيروز</h3>
<div class="price">249 درهم</div>
<button>طلب عبر واتساب</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<div class="card-content">
<h3>ملحفة ملكية</h3>
<div class="price">179 درهم</div>
<button>طلب عبر واتساب</button>
</div>
</div>

</div>
</section>

<footer>
© 2026 ملاحف فيروز - جميع الحقوق محفوظة
</footer>

</body>
</html>
