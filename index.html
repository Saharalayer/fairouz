<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملاحف فيروز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#fff0f6;
color:#333;
}

header{
background:linear-gradient(90deg,#d4af37,#f7b6d2);
padding:15px;
text-align:center;
color:white;
font-size:24px;
font-weight:bold;
}

.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1520975958225-4d3c1f8b4b3d') center/cover;
color:white;
}

.hero h1{font-size:40px;margin-bottom:10px;}
.hero p{font-size:18px;}
.btn{
margin-top:20px;
background:#d4af37;
padding:12px 25px;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
}

.products{
padding:40px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{margin:10px 0;}
.card button{
background:#f7b6d2;
border:none;
padding:10px;
border-radius:20px;
cursor:pointer;
}

footer{
background:#d4af37;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}
</style>

</head>

<body>

<header>ملاحف فيروز ✨</header>

<section class="hero">
<h1>أناقة وردية بلمسة ذهبية</h1>
<p>اكتشفي أجمل الملاحف الفاخرة</p>
<button class="btn">تسوقي الآن</button>
</section>

<section class="products">
<h2>أحدث الملاحف</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<h3>ملحفة روز</h3>
<p>199 درهم</p>
<button>طلب عبر واتساب</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1618354691328-8b0b1c9a0b7b">
<h3>ملحفة فيروز</h3>
<p>249 درهم</p>
<button>طلب عبر واتساب</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>ملحفة ملكية</h3>
<p>179 درهم</p>
<button>طلب عبر واتساب</button>
</div>

</div>
</section>

<footer>
© 2026 ملاحف فيروز - جميع الحقوق محفوظة
</footer>

</body>
</html>
